  <!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulado — Transporte de Cargas</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0f1a;
    --surface: #131929;
    --surface2: #1a2235;
    --border: #1f2e4a;
    --accent: #3b82f6;
    --accent2: #06b6d4;
    --correct: #22c55e;
    --wrong: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
    --gold: #f59e0b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    min-height: 100vh;
    padding: 0 0 80px;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, #0d1b3e 0%, #0b1628 60%, #091220 100%);
    border-bottom: 1px solid var(--border);
    padding: 40px 24px 32px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% -20%, rgba(59,130,246,.18) 0%, transparent 70%);
  }
  header .tag {
    display: inline-block;
    background: rgba(59,130,246,.15);
    border: 1px solid rgba(59,130,246,.3);
    color: var(--accent2);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .12em;
    text-transform: uppercase;
    padding: 4px 14px;
    border-radius: 100px;
    margin-bottom: 16px;
  }
  header h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(28px, 6vw, 48px);
    letter-spacing: -.02em;
    line-height: 1.1;
    position: relative;
  }
  header h1 span { color: var(--accent); }
  header p {
    margin-top: 10px;
    color: var(--muted);
    font-size: 14px;
    position: relative;
  }

  /* ── SCOREBOARD ── */
  #scoreboard {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    padding: 20px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }
  .score-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 16px;
    font-size: 13px;
    font-weight: 500;
  }
  .score-pill .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-total  { background: var(--accent); }
  .dot-correct{ background: var(--correct); }
  .dot-wrong  { background: var(--wrong); }
  .score-pill strong { font-family: 'Syne', sans-serif; font-size: 16px; }

  /* ── QUIZ CONTAINER ── */
  .quiz-wrap {
    max-width: 780px;
    margin: 0 auto;
    padding: 32px 20px;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  /* ── QUESTION CARD ── */
  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: border-color .3s, box-shadow .3s;
  }
  .question-card.answered-correct {
    border-color: rgba(34,197,94,.4);
    box-shadow: 0 0 0 1px rgba(34,197,94,.1), 0 8px 32px rgba(0,0,0,.3);
  }
  .question-card.answered-wrong {
    border-color: rgba(239,68,68,.4);
    box-shadow: 0 0 0 1px rgba(239,68,68,.1), 0 8px 32px rgba(0,0,0,.3);
  }

  .q-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 20px 22px 0;
  }
  .q-num {
    flex-shrink: 0;
    width: 32px; height: 32px;
    background: rgba(59,130,246,.15);
    border: 1px solid rgba(59,130,246,.3);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    margin-top: 2px;
  }
  .q-text {
    font-size: 15px;
    line-height: 1.6;
    font-weight: 400;
    color: var(--text);
    padding-bottom: 18px;
  }

  /* ── OPTIONS ── */
  .options {
    padding: 0 22px 22px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .option-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    cursor: pointer;
    transition: all .2s;
    text-align: left;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    line-height: 1.45;
  }
  .option-btn:hover:not(:disabled) {
    background: rgba(59,130,246,.08);
    border-color: rgba(59,130,246,.35);
    color: #fff;
  }
  .option-btn .letter {
    flex-shrink: 0;
    width: 26px; height: 26px;
    border-radius: 6px;
    background: rgba(255,255,255,.06);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    transition: all .2s;
  }
  .option-btn:hover:not(:disabled) .letter {
    background: rgba(59,130,246,.2);
    border-color: rgba(59,130,246,.5);
    color: var(--accent);
  }

  /* answered states */
  .option-btn.correct {
    background: rgba(34,197,94,.1);
    border-color: rgba(34,197,94,.5);
    color: #86efac;
  }
  .option-btn.correct .letter {
    background: rgba(34,197,94,.25);
    border-color: rgba(34,197,94,.6);
    color: #22c55e;
  }
  .option-btn.wrong {
    background: rgba(239,68,68,.1);
    border-color: rgba(239,68,68,.5);
    color: #fca5a5;
  }
  .option-btn.wrong .letter {
    background: rgba(239,68,68,.25);
    border-color: rgba(239,68,68,.6);
    color: #ef4444;
  }
  .option-btn.reveal-correct {
    background: rgba(34,197,94,.06);
    border-color: rgba(34,197,94,.3);
    color: #86efac;
  }
  .option-btn.reveal-correct .letter {
    background: rgba(34,197,94,.15);
    border-color: rgba(34,197,94,.4);
    color: #22c55e;
  }
  .option-btn:disabled { cursor: default; }

  /* ── FEEDBACK ── */
  .feedback {
    display: none;
    align-items: center;
    gap: 10px;
    margin: 0 22px 18px;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    animation: fadeUp .3s ease;
  }
  .feedback.show { display: flex; }
  .feedback.correct-fb {
    background: rgba(34,197,94,.1);
    border: 1px solid rgba(34,197,94,.3);
    color: #86efac;
  }
  .feedback.wrong-fb {
    background: rgba(239,68,68,.1);
    border: 1px solid rgba(239,68,68,.3);
    color: #fca5a5;
  }
  .feedback-icon { font-size: 16px; }

  /* ── RESET BUTTON ── */
  .reset-wrap {
    text-align: center;
    padding: 8px 20px 0;
  }
  #resetBtn {
    background: rgba(59,130,246,.12);
    border: 1px solid rgba(59,130,246,.3);
    color: var(--accent);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: .04em;
    padding: 12px 32px;
    border-radius: 100px;
    cursor: pointer;
    transition: all .2s;
  }
  #resetBtn:hover {
    background: rgba(59,130,246,.22);
    border-color: rgba(59,130,246,.6);
    color: #fff;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── RESULT BANNER ── */
  #resultBanner {
    display: none;
    background: linear-gradient(135deg, var(--surface) 0%, #0d1b3e 100%);
    border: 1px solid rgba(245,158,11,.3);
    border-radius: 16px;
    padding: 28px 24px;
    text-align: center;
    margin: 0 20px;
    animation: fadeUp .5s ease;
  }
  #resultBanner h2 {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: var(--gold);
    margin-bottom: 8px;
  }
  #resultBanner p { color: var(--muted); font-size: 15px; }
  #resultBanner .big-score {
    font-family: 'Syne', sans-serif;
    font-size: 60px;
    font-weight: 800;
    line-height: 1;
    margin: 16px 0 4px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
</style>
</head>
<body>

<header>
  <div class="tag">Simulado Interativo</div>
  <h1>Transporte de <span>Cargas</span></h1>
  <p>Responda cada questão e receba feedback imediato</p>
</header>

<div id="scoreboard">
  <div class="score-pill"><span class="dot dot-total"></span>Questões <strong id="s-total">0</strong></div>
  <div class="score-pill"><span class="dot dot-correct"></span>Corretas <strong id="s-correct">0</strong></div>
  <div class="score-pill"><span class="dot dot-wrong"></span>Erradas <strong id="s-wrong">0</strong></div>
</div>

<div class="quiz-wrap" id="quizWrap"></div>

<div class="reset-wrap">
  <button id="resetBtn" onclick="resetQuiz()">↺ Reiniciar Simulado</button>
</div>

<div id="resultBanner">
  <h2>🎓 Simulado Concluído!</h2>
  <div class="big-score" id="finalScore"></div>
  <p id="finalMsg"></p>
</div>

<script>
const questions = [
  {
    id: 1,
    text: "Este não é um exemplo de categoria de navio de carga unitária:",
    options: ["Reefer Ship","Open Hatch Bulk Carriers","RoRo","Pure Car Carrier","Heavy Lift ou Jumbo"],
    answer: 0 // B
  },
  {
    id: 2,
    text: "Assinale a alternativa que não representa um granel líquido:",
    options: ["Amônia","Nafta","Querosene","Diesel","Gasolina"],
    answer: 0 // A
  },
  {
    id: 3,
    text: "Que fração aproximada do mercado de granel sólido representa os \"major bulks\"?",
    options: ["65%","55%","75%","45%","35%"],
    answer: 0 // A
  },
  {
    id: 4,
    text: "O transporte aeroviário apresenta características próprias. Assinale a alternativa que indica uma das desvantagens do transporte aeroviário.",
    options: [
      "Baixo consumo de combustíveis.",
      "Restrições climáticas na operação.",
      "Flexibilidade na instalação de terminais aeroportuários.",
      "Manutenção acessível de aeronaves.",
      "Normas Internacionais pouco rigorosas."
    ],
    answer: 1 // B
  },
  {
    id: 5,
    text: "Diversos avanços observados nas questões de ________ que disciplinam o tráfego aéreo e os requisitos para da aviação, permitiram que diversos aeroportos fossem construídos em muitos países e novas rotas aéreas fossem criadas.",
    options: [
      "Autonomia e regulação",
      "Regulação e segurança",
      "Segurança e autonomia",
      "Viabilidade e segurança",
      "Autonomia e viabilidade"
    ],
    answer: 1 // B
  },
  {
    id: 6,
    text: "O cálculo de cubagem é um fator imprescindível para se compreender qual será a melhor forma de transportar cada tipo de produto. Esse cálculo estabelece a relação entre:",
    options: [
      "O valor e a quantidade de carga",
      "A quantidade de carga e o espaço disponível na aeronave",
      "O volume e o peso de uma carga",
      "O peso e a potência da aeronave",
      "O peso da aeronave e o volume da carga"
    ],
    answer: 2 // C
  },
  {
    id: 7,
    text: "A aviação comercial possibilitou a integração do comércio, a produção e as finanças. O que hoje é conhecido como a aviação comercial teve seu início:",
    options: [
      "Após a Segunda Guerra Mundial",
      "Após a guerra das Malvinas",
      "Após o 11 de setembro",
      "Após a Guerra do Vietnã",
      "Após a Primeira Guerra Mundial"
    ],
    answer: 4 // A
  },
  {
    id: 8,
    text: "Esta não é uma carga tipicamente transportada em navios refrigerados:",
    options: ["Carnes","Frutas","Leite","Peixe","Milho"],
    answer: 4 // E
  },
  {
    id: 9,
    text: "Estas são as dimensões de um contêiner padrão:",
    options: ["20' 10' 6\"","20' 8'6\"","40' 10' 6\"","40' 10' 8\"","20' 6'6\""],
    answer: 1 // B
  },
  {
    id: 10,
    text: "A aviação comercial, como é conhecida hoje em dia, se desenvolveu na segunda metade do século XIX. Um dos fatores que impulsionaram o desenvolvimento do sistema de transporte aeroviário de forma comercial foi:",
    options: [
      "A modernização dos aeroportos",
      "Os efeitos benéficos da globalização",
      "O desenvolvimento de aeroportos mais modernos",
      "A criação do sistema de radares",
      "O desenvolvimento do modo rodoviário de transporte"
    ],
    answer: 1 // B
  },
{
    id: 11,
    text: "O sistema de transporte aéreo se desenvolveu rapidamente. O que impulsionou o desenvolvimento rápido do sistema de transporte aéreo?",
    options: [
      "Investimentos em rodovias e ferrovias.",
      "Desenvolvimento de terminais marítimos.",
      "Evolução da tecnologia aeronáutica.",
      "Aprimoramento da infraestrutura portuária.",
      "Aumento da capacidade de carga de aeronaves."
    ],
    answer: 2 // C
  },
  {
    id: 12,
    text: "A descentralização da produção de diversos tipos de mercadorias tornou-se um desafio para o comércio eletrônico que, por sua vez, necessita colocar os produtos adquiridos pela internet a longas distâncias e com a rapidez esperada. Logisticamente falando, este meio de comercialização de produtos tornou-se cada vez mais viável devido à utilização:",
    options: [
      "Do sistema de transporte aéreo",
      "Da navegação e dos containers",
      "De meios de pagamentos diversificados",
      "De peças produzidas no Brasil",
      "De matérias-primas produzidas na Ásia"
    ],
    answer: 0 // A
  },
  {
    id: 13,
    text: "Todas essas são consequências da contêinerização, exceto:",
    options: [
      "Perda de espaço do modelo de tramp shipping.",
      "Desaparecimento de empresas.",
      "Paradigma door-to-door.",
      "Migração de minor bulks para transporte especializado.",
      "Aumento do tempo gasto na zona portuária."
    ],
    answer: 4 // E
  },
  {
    id: 14,
    text: "Existe um órgão internacional que é responsável pela autorregulação do transporte aéreo internacional. Assinale a alternativa que indica a sigla desse órgão.",
    options: ["IATA","OACI","ANAC","INFRAERO","DOT"],
    answer: 0 // A
  },
  {
    id: 15,
    text: "O sistema de transporte aéreo é bastante utilizado para o transporte de cargas, entretanto existem algumas restrições. As cargas mais recomendadas para serem transportadas são:",
    options: [
      "Cargas vivas",
      "Cargas leves e volumosas",
      "Cargas de maior valor agregado",
      "Cargas pesadas",
      "Cargas não perecíveis"
    ],
    answer: 2 // C
  },
  {
    id: 16,
    text: "O sistema de transporte aéreo possui vantagens e desvantagens. Quais são as principais vantagens do sistema de transporte aéreo?",
    options: [
      "Baixo consumo de combustível.",
      "Infraestrutura flexível em qualquer localidade.",
      "Manuseio manual das cargas transportadas.",
      "Elevada segurança e agilidade.",
      "Restrição ao transporte de mercadorias perecíveis."
    ],
    answer: 3 // D
  },
  {
    id: 17,
    text: "O sistema de transporte aéreo se desenvolveu de forma muito rápida. Um dos motivos que explica esse fenômeno é a evolução:",
    options: [
      "Dos outros sistemas de transporte",
      "Do sistema de armazenagem de mercadorias perecíveis",
      "Dos equipamentos utilizados no manuseio de mercadorias",
      "Da sua tecnologia e aperfeiçoamento de questões regulatórias",
      "Do seu arcabouço jurídico empresarial"
    ],
    answer: 3 // D
  },
  {
    id: 18,
    text: "Existem regras e valores máximos para frete através de transporte aéreo. Quem estabelece regras e fixa valores de fretes máximos para as empresas aéreas no transporte internacional de cargas?",
    options: [
      "Empresas aéreas individualmente.",
      "Associação Internacional de Transporte Terrestre.",
      "Associação Internacional de Transporte Aéreo (IATA).",
      "Clientes das empresas de transporte aéreo.",
      "Agências reguladoras de transporte."
    ],
    answer: 2 // C
  },
  {
    id: 19,
    text: "Graças às viagens aéreas internacionais por motivações ______________, diversas regiões do mundo se desenvolveram e aumentaram sua participação econômica na escala mundial, devido ao intenso fluxo de pessoas que viajam anualmente a lazer.",
    options: [
      "Financeiras",
      "Operacionais",
      "Militares",
      "Turísticas",
      "Religiosas"
    ],
    answer: 3 // D
  },
  {
    id: 20,
    text: "A infraestrutura dos aeroportos no Brasil recebeu vários investimentos que permitiram que fosse comparada às melhores do mundo. Esses investimentos ocorreram por causa:",
    options: [
      "De grandes eventos esportivos",
      "De numerosos eventos religiosos",
      "Da criação da ANAC",
      "Da criação da Infraero",
      "Da modernização logística"
    ],
    answer: 0 // A
  }
];


const letters = ['A','B','C','D','E'];
let answered = {};

function buildQuiz() {
  const wrap = document.getElementById('quizWrap');
  wrap.innerHTML = '';
  questions.forEach((q, qi) => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = `card-${qi}`;

    const optionsHtml = q.options.map((opt, oi) => `
      <button class="option-btn" id="opt-${qi}-${oi}" onclick="answer(${qi}, ${oi})">
        <span class="letter">${letters[oi]}</span>
        <span>${opt}</span>
      </button>
    `).join('');

    card.innerHTML = `
      <div class="q-header">
        <div class="q-num">${q.id}</div>
        <div class="q-text">${q.text}</div>
      </div>
      <div class="options">${optionsHtml}</div>
      <div class="feedback" id="fb-${qi}">
        <span class="feedback-icon"></span>
        <span class="fb-text"></span>
      </div>
    `;
    wrap.appendChild(card);
  });
  updateScore();
}

function answer(qi, oi) {
  if (answered[qi] !== undefined) return;
  answered[qi] = oi;

  const q = questions[qi];
  const isCorrect = oi === q.answer;
  const card = document.getElementById(`card-${qi}`);
  const fb = document.getElementById(`fb-${qi}`);

  // disable all buttons
  q.options.forEach((_, i) => {
    const btn = document.getElementById(`opt-${qi}-${i}`);
    btn.disabled = true;
    if (i === q.answer && !isCorrect) btn.classList.add('reveal-correct');
  });

  const chosenBtn = document.getElementById(`opt-${qi}-${oi}`);
  chosenBtn.classList.add(isCorrect ? 'correct' : 'wrong');
  card.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');

  // feedback
  fb.classList.add('show', isCorrect ? 'correct-fb' : 'wrong-fb');
  fb.querySelector('.feedback-icon').textContent = isCorrect ? '✓' : '✗';
  fb.querySelector('.fb-text').textContent = isCorrect
    ? 'Resposta correta! Muito bem!'
    : `Resposta incorreta. A alternativa correta é ${letters[q.answer]}.`;

  updateScore();
  checkComplete();
}

function updateScore() {
  const total = questions.length;
  const answeredCount = Object.keys(answered).length;
  const correct = Object.entries(answered).filter(([qi, oi]) => questions[qi].answer === oi).length;
  const wrong = answeredCount - correct;

  document.getElementById('s-total').textContent = `${answeredCount}/${total}`;
  document.getElementById('s-correct').textContent = correct;
  document.getElementById('s-wrong').textContent = wrong;
}

function checkComplete() {
  if (Object.keys(answered).length < questions.length) return;
  const correct = Object.entries(answered).filter(([qi, oi]) => questions[qi].answer === oi).length;
  const pct = Math.round((correct / questions.length) * 100);
  const banner = document.getElementById('resultBanner');
  banner.style.display = 'block';
  document.getElementById('finalScore').textContent = `${pct}%`;
  let msg = '';
  if (pct === 100) msg = 'Parabéns! Acerto perfeito! 🏆';
  else if (pct >= 70) msg = `Bom desempenho! Você acertou ${correct} de ${questions.length} questões.`;
  else msg = `Você acertou ${correct} de ${questions.length} questões. Continue estudando!`;
  document.getElementById('finalMsg').textContent = msg;
  banner.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function resetQuiz() {
  answered = {};
  document.getElementById('resultBanner').style.display = 'none';
  buildQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
    
  </body>
  
</html>
